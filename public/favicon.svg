<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <rect width="100" height="100" fill="#0d0d0d" />
  
  <!-- Left arm -->
  <polygon points="15,20 35,20 60,55 40,55" fill="#00f2ea" />
  
  <!-- Right arm (slightly darker to show depth/overlap) -->
  <polygon points="85,20 65,20 40,55 60,55" fill="#00c4bd" />
  
  <!-- Y stem -->
  <polygon points="45,62 55,62 55,85 45,85" fill="#00f2ea" />
  
  <!-- Tactical corner marks -->
  <rect x="10" y="10" width="10" height="2" fill="#00f2ea" opacity="0.5" />
  <rect x="10" y="10" width="2" height="10" fill="#00f2ea" opacity="0.5" />
  
  <rect x="80" y="88" width="10" height="2" fill="#00f2ea" opacity="0.5" />
  <rect x="88" y="80" width="2" height="10" fill="#00f2ea" opacity="0.5" />
  
  <!-- Digital data nodes -->
  <rect x="15" y="85" width="5" height="5" fill="#00f2ea" />
  <rect x="25" y="85" width="5" height="5" fill="#00f2ea" opacity="0.3" />
</svg>